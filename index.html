<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="main-container">
      <section class="rating-container">
        <div class="img-container">
          <img class="star" src="./images/icon-star.svg" alt="star icon" />
        </div>
        <div class="text-container">
          <h1>How did we do?</h1>
          <p>
            Please let us know how we did with your support request. All
            feedback is appreciated to help us improve our offering!
          </p>
        </div>
        <div class="rating-no">
          <button class="no">1</button>
          <button class="no">2</button>
          <button class="no">3</button>
          <button class="no">4</button>
          <button class="no">5</button>
        </div>
        <button class="submit-btn">SUBMIT</button>
      </section>
      <section class="thankyou-container hidden">
        <img
          class="thank-you"
          src="./images/illustration-thank-you.svg"
          alt="thank you slate"
        />
        <div class="rating-message">
          <span>You selected <span class="rating"></span> out of 5</span>
        </div>
        <div class="text-container">
          <h1>Thank you!</h1>
          <p>
            We appreciate you taking the time to give a rating. If you ever need
            more support, don’t hesitate to get in touch!
          </p>
        </div>
      </section>
    </main>
    <script src="index.js"></script>
  </body>
</html>
